name: Build Frisk Emulator EXE

on:
  push:
    tags: ["v*"] # v1.0.0 などのタグがついた時に発動

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build Electron App
        run: npm run build # ViteビルドとElectron Builderを実行
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release EXE
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*.exe # 生成されたインストーラーを指定
